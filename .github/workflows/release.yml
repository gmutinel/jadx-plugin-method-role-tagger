name: Release

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:
        inputs:
            jadx_version:
                description: "jadx version to compile against (e.g. 1.5.1)"
                required: false
                default: "1.5.1"

jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: "21"

            - name: Build plugin JAR
              run: |
                  chmod +x build.sh
                  JADX_VERSION="${{ github.event.inputs.jadx_version || '1.5.1' }}" ./build.sh

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: jadx-plugin-method-role-tagger
                  path: jadx-plugin-method-role-tagger.jar

            - name: Create GitHub Release
              if: startsWith(github.ref, 'refs/tags/')
              uses: softprops/action-gh-release@v2
              with:
                  files: jadx-plugin-method-role-tagger.jar
                  generate_release_notes: true
